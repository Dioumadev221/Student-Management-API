spring.application.name=Student-Management-API

# Profil actif par defaut (surchargeable via -Dspring.profiles.active=prod)
spring.profiles.active=dev

# --- JPA / Hibernate (parametres communs a tous les profils) ---
# On desactive l'Open Session In View : chaque couche gere explicitement ses transactions.
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# --- Documentation OpenAPI / Swagger UI ---
# Swagger UI  : http://localhost:8080/swagger-ui.html
# Spec OpenAPI: http://localhost:8080/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
