spring.application.name=Student-Management-API

spring.profiles.active=dev


# On desactive l'Open Session In View : chaque couche gere explicitement ses transactions.
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# --- Securite JWT ---
# La cle est en Base64. En production, surcharger via la variable d'environnement JWT_SECRET.
jwt.secret=${JWT_SECRET:c3R1ZGVudC1tYW5hZ2VtZW50LWFwaS1qd3Qtc2VjcmV0LWtleS0yMDI2LXBsZWFzZS1jaGFuZ2UtbWUhIQ==}
# Duree de validite du token en millisecondes (ici 24h).
jwt.expiration=${JWT_EXPIRATION:86400000}
