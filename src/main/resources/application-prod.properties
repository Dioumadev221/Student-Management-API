# =====================================================================
# Profil PROD  -  base de donnees cloud "isepat_cloud"
# Aucun secret n'est ecrit en dur : tout provient de variables d'environnement.
# =====================================================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/isepat_cloud
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# En production le schema est gere par des migrations : on se contente de le valider.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
