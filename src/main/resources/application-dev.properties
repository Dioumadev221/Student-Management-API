# =====================================================================
# Profil DEV  -  base de donnees locale "isepat_dev"
# =====================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/isepat_dev
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# En dev on laisse Hibernate creer/mettre a jour le schema automatiquement.
spring.jpa.hibernate.ddl-auto=update

# Traces SQL lisibles pendant le developpement.
spring.jpa.show-sql=true
